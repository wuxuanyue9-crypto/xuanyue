    :root {

      padding: 28px 18px 56px;

      border-radius: 6px;

    }
    h1, h2, h3, h4 { line-height: 1.25; letter-spacing: 0; }
    h1 {
      margin: 0;
      padding: 0 0 18px;
      border-bottom: 2px solid var(--text);
      font-size: 34px;
      font-weight: 760;
    }
    h1 + p {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 14px;
    }
    h2 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 34px 0 14px;
      padding: 14px 0 10px;
      border-top: 1px solid var(--line-strong);
      font-size: 22px;
      font-weight: 720;
    }
    h2::before {
      content: "";
      width: 7px;
      height: 22px;
      border-radius: 2px;
      background: var(--accent);
      flex: none;
    }
    h3 {
      margin: 24px 0 8px;
      font-size: 18px;
      color: var(--accent-ink);
    }
    h4 {
      margin: 14px 0 8px;
      font-size: 15px;
      color: var(--blue);
    }
    p, ul, blockquote { margin: 10px 0; }
    .lead { color: var(--muted); }
    ul {
      padding: 12px 14px 12px 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
    }
    li { margin: 5px 0; }
    .table-wrap {
      overflow-x: auto;
      margin: 14px 0 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 860px;
      background: #fff;
      font-variant-numeric: tabular-nums;
    }
    th, td {
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
      font-size: 14px;
    }
    td.long-text {
      min-width: 300px;
      max-width: 560px;
      white-space: normal;
      vertical-align: top;
    }
    .cell-clip {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    td.long-text:hover .cell-clip {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
    }
    .merged-cell {
      background: #f0f6f5;
      color: var(--accent-ink);
      font-weight: 700;
      vertical-align: middle;
      border-right: 1px solid var(--line);
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eaf0f4;
      color: #273143;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: 0; }
    tr:nth-child(even) td { background: #fbfcfd; }
    tr:hover td { background: var(--accent-soft); }
    blockquote {
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      padding: 10px 14px;
      color: var(--accent-ink);
    }
    code { background: #eef2f6; padding: 1px 5px; border-radius: 4px; }
    .archive {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .archive a, .archive-list a { color: var(--accent); text-decoration: none; }
    .archive a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff;
      transition: border-color 140ms ease, color 140ms ease;
    }
    .archive a:hover { border-color: var(--accent); color: var(--accent-ink); }
    .archive-list { padding-left: 0; list-style: none; }
    .archive-list li { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .archive-list span { color: var(--muted); width: 42px; flex: none; }
    a:focus-visible {
      outline: 3px solid var(--gold-soft);
      outline-offset: 2px;
    }
    @media (max-width: 680px) {
      main { padding: 10px; }
      article { padding: 18px 12px; border-radius: 6px; }
      h1 { font-size: 24px; }
      h1 + p { font-size: 13px; }
      h2 { font-size: 18px; margin-top: 28px; }
      h3 { font-size: 16px; }
      th, td { padding: 8px 9px; font-size: 13px; }
      ul { padding: 10px 10px 10px 24px; }
    }
  </style>
