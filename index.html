<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A股强势股每日筛选观察池">
  <meta property="og:title" content="A股强势股筛选">
  <meta property="og:description" content="每日收盘后自动生成的强势股观察池，仅用于观察和复盘。">
  <title>A股强势股筛选</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3e9;
      --panel: #fffdf8;
      --panel-soft: #faf5e8;
      --text: #241d12;
      --muted: #766b59;
      --line: #e8ddc7;
      --gold: #9a6a18;
      --gold-bright: #c29a47;
      --gold-ink: #704a0d;
      --gold-soft: #f3e5c1;
      --gold-pale: #fbf5e5;
      --accent: var(--gold);
      --accent-ink: var(--gold-ink);
      --accent-soft: var(--gold-soft);
      --green: #34735d;
      --red: #a44338;
      --yellow: #9a6a18;
      --focus: #81570f;
      --radius: 16px;
      --shadow: 0 1px 2px rgba(80,57,18,0.05), 0 12px 30px rgba(80,57,18,0.055);
      --shadow-lg: 0 18px 48px rgba(80,57,18,0.12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 8% 0%, rgba(194,154,71,0.16), transparent 28rem),
        radial-gradient(circle at 92% 18%, rgba(255,255,255,0.95), transparent 30rem),
        linear-gradient(180deg, #fbf8f0 0%, var(--bg) 32%, #f4efe4 100%);
      color: var(--text);
      font-family: "Avenir Next", "DIN Alternate", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      font-size: 15px;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 18px 64px;
    }
    article {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }
    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .title-block { min-width: 0; }
    .eyebrow {
      margin-bottom: 5px;
      color: var(--gold);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
    }
    .page-head h1 {
      margin: 0;
      padding: 0;
      border: 0;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 750;
      letter-spacing: -0.025em;
    }
    .date {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .date span {
      white-space: nowrap;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--gold-ink);
      background: rgba(255,253,248,0.7);
      font-size: 10px;
      font-weight: 700;
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .history-menu {
      position: relative;
      z-index: 6;
    }
    .history-menu > summary {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,253,248,0.9);
      box-shadow: var(--shadow);
      color: var(--text);
      cursor: pointer;
      list-style: none;
      font-size: 13px;
      font-weight: 700;
    }
    .history-menu > summary::-webkit-details-marker { display: none; }
    .history-menu > summary span {
      display: inline-grid;
      min-width: 22px;
      height: 22px;
      place-items: center;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--gold-ink);
      font-size: 11px;
    }
    .history-menu .page-nav {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(420px, calc(100vw - 36px));
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,253,248,0.98);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
    }
    .section-nav {
      position: sticky;
      top: 8px;
      z-index: 4;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: -8px 0 18px;
      padding: 6px;
      border: 1px solid rgba(154,106,24,0.18);
      border-radius: 12px;
      background: rgba(255,253,248,0.9);
      box-shadow: 0 6px 18px rgba(80,57,18,0.06);
      backdrop-filter: blur(12px);
    }
    .section-nav a {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      padding: 7px 11px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .section-nav a:hover {
      background: var(--accent-soft);
      color: var(--accent-ink);
    }
    .nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 650;
      transition: background 0.2s, color 0.2s;
    }
    .nav-pill.active {
      border-color: var(--gold);
      background: var(--gold);
      color: #fff;
    }
    .nav-pill:hover:not(.active) {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(154,106,24,0.14);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      scroll-margin-top: 72px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 17px;
      font-weight: 600;
    }
    .card-title::before {
      content: "";
      width: 3px;
      height: 17px;
      border-radius: 999px;
      background: var(--accent);
    }
    .collapsed-card > summary {
      min-height: 28px;
      cursor: pointer;
      list-style: none;
      margin-bottom: 0;
    }
    .collapsed-card > summary::-webkit-details-marker { display: none; }
    .collapsed-card > summary::after {
      content: "+";
      display: inline-grid;
      width: 26px;
      height: 26px;
      flex: none;
      place-items: center;
      margin-left: 2px;
      border-radius: 999px;
      background: var(--gold-pale);
      color: var(--gold-ink);
      font-size: 18px;
      font-weight: 500;
    }
    .summary-meta {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
    }
    .collapsed-card[open] > summary { margin-bottom: 16px; }
    .collapsed-card[open] > summary::after { content: "-"; color: var(--gold-ink); }
    .doc-body h1, .doc-body h2, .doc-body h3, .doc-body h4 { line-height: 1.25; letter-spacing: 0; }
    .doc-body h1 + p {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 14px;
    }
    .doc-body h3 {
      margin: 18px 0 8px;
      font-size: 15px;
      color: var(--accent);
    }
    .doc-body h4 {
      margin: 14px 0 8px;
      font-size: 14px;
      color: var(--text);
    }
    .doc-body p, .doc-body ul, .doc-body blockquote { margin: 10px 0; }
    .lead { color: var(--muted); }
    .doc-body ul {
      padding: 12px 14px 12px 28px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
    }
    li { margin: 5px 0; }
    .table-wrap {
      overflow-x: auto;
      margin: 0 0 16px;
      border: 0;
      border-radius: 0;
      background: transparent;
    }
    .card > .table-wrap:last-child {
      margin-bottom: 0;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .overview-item {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(145deg, #fffefa 0%, var(--gold-pale) 100%);
    }
    .overview-item span {
      display: block;
      color: var(--gold);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }
    .overview-item strong {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      line-height: 1.4;
    }
    .overview-item p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .rule-gate-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .rule-gate {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: linear-gradient(180deg, #fffdf8 0%, #fbf7ed 100%);
    }
    .rule-gate-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .rule-gate-head > div { min-width: 0; }
    .rule-gate-head > div > span { display: block; color: var(--muted); font-size: 10px; }
    .rule-gate-head strong { display: block; margin-top: 2px; font-size: 14px; }
    .rule-status {
      display: inline-flex;
      flex: none;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 750;
      white-space: nowrap;
    }
    .status-pass { background: #e8f2ed; color: var(--green); }
    .status-watch { background: var(--gold-soft); color: var(--gold-ink); }
    .status-reject { background: #f7e5e1; color: var(--red); }
    .status-missing, .status-neutral { background: #eeeae1; color: #655d50; }
    .status-paper { border: 1px solid #dfc787; background: var(--gold-pale); color: var(--gold-ink); }
    .rule-decision { margin: 12px 0 9px; font-weight: 700; line-height: 1.45; }
    .rule-evidence, .rule-next {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 7px;
      padding: 7px 0;
      border-top: 1px solid rgba(232,221,199,0.75);
    }
    .rule-evidence span, .rule-next span { color: var(--muted); font-size: 10px; }
    .rule-evidence p, .rule-next p { margin: 0; font-size: 11px; line-height: 1.5; }
    .rule-diagnostics {
      margin-top: 7px;
      border-top: 1px dashed rgba(203,184,136,0.75);
      color: var(--muted);
      font-size: 10px;
    }
    .rule-diagnostics summary {
      padding-top: 7px;
      cursor: pointer;
      font-weight: 700;
      list-style: none;
    }
    .rule-diagnostics summary::-webkit-details-marker { display: none; }
    .rule-diagnostics p { margin: 5px 0 0; line-height: 1.45; }
    .reason-code { display: block; margin-top: 7px; overflow-wrap: anywhere; color: var(--muted); font-size: 9px; }
    .rulebook-groups { display: grid; gap: 9px; }
    .rulebook-group { border: 1px solid var(--line); border-radius: 12px; background: #fffdf8; }
    .rulebook-group > summary {
      display: flex;
      min-height: 44px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 13px;
      cursor: pointer;
      list-style: none;
      color: var(--text);
      font-weight: 750;
    }
    .rulebook-group > summary::-webkit-details-marker { display: none; }
    .rulebook-group > summary span:last-child { color: var(--muted); font-size: 10px; font-weight: 600; }
    .rulebook-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0 10px 10px;
    }
    .rulebook-rule { padding: 11px; border: 1px solid #eee4d1; border-radius: 10px; background: var(--gold-pale); }
    .rulebook-rule-head { display: flex; justify-content: space-between; gap: 8px; }
    .rulebook-rule-head > div { min-width: 0; }
    .rulebook-rule-head code { display: block; color: var(--muted); font-size: 9px; overflow-wrap: anywhere; }
    .rulebook-rule-head strong { display: block; margin-top: 3px; font-size: 13px; }
    .rulebook-rule > p { margin: 8px 0; font-size: 11px; line-height: 1.55; }
    .rulebook-formula { padding: 8px; border-radius: 8px; background: rgba(255,253,248,0.8); }
    .rulebook-formula span { display: block; color: var(--muted); font-size: 9px; }
    .rulebook-formula code { display: block; margin-top: 3px; overflow-wrap: anywhere; font-size: 10px; }
    .rulebook-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .rulebook-meta span { padding: 2px 6px; border-radius: 999px; background: #eee7d9; color: var(--muted); font-size: 9px; }
    .rule-downloads { margin-bottom: 14px; }
    .rule-download-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .rule-download-grid a {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid #dfc787;
      border-radius: 10px;
      background: var(--gold-pale);
      color: var(--gold-ink);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }
    .trade-disclaimer {
      margin: -2px 0 12px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--gold-pale);
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }
    .trade-empty {
      display: grid;
      gap: 7px;
      padding: 16px;
      border: 1px solid rgba(148, 116, 54, 0.28);
      border-radius: 12px;
      background: linear-gradient(145deg, #fffdf8 0%, #f7efe0 100%);
    }
    .trade-empty-status {
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--gold-ink);
      font-size: 11px;
      font-weight: 750;
    }
    .trade-empty strong {
      color: var(--text);
      font-size: 18px;
      line-height: 1.35;
    }
    .trade-empty p {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }
    .trade-empty span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .shadow-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .shadow-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff 0%, #fffaf0 100%);
    }
    .shadow-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shadow-identity {
      display: grid;
      min-width: 0;
      gap: 2px;
    }
    .shadow-identity h3 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.3;
    }
    .shadow-identity span { color: var(--muted); font-size: 12px; }
    .shadow-decision {
      margin-left: auto;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 750;
    }
    .shadow-ready { background: #e8f2ed; color: var(--green); }
    .shadow-wait { background: var(--gold-soft); color: var(--gold-ink); }
    .shadow-reject { background: #eeeae1; color: #655d50; }
    .shadow-status {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 13px 0 9px;
    }
    .shadow-status strong { font-size: 14px; }
    .shadow-status span { color: var(--muted); font-size: 11px; }
    .shadow-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .shadow-metric {
      display: grid;
      min-width: 0;
      gap: 2px;
      padding: 8px;
      border: 1px solid rgba(232,221,199,0.8);
      border-radius: 9px;
      background: rgba(250,245,232,0.65);
    }
    .shadow-metric span { color: var(--muted); font-size: 10px; }
    .shadow-metric strong {
      overflow: hidden;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shadow-conclusion {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 8px;
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
    }
    .shadow-conclusion span { color: var(--muted); font-size: 10px; }
    .shadow-conclusion p { margin: 0; font-size: 12px; line-height: 1.5; }
    .trade-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .trade-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff 0%, #fffaf0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
    }
    .trade-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .trade-rank {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      flex: none;
      border-radius: 9px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-size: 13px;
      font-weight: 750;
    }
    .trade-identity {
      display: grid;
      min-width: 0;
      gap: 2px;
    }
    .trade-identity h3 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.3;
    }
    .trade-identity span { color: var(--muted); font-size: 12px; }
    .trade-state {
      margin-left: auto;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .state-ready { background: var(--gold-soft); color: var(--gold-ink); }
    .state-pullback { background: #e8f2ed; color: var(--green); }
    .state-muted { background: #eeeae1; color: #655d50; }
    .state-risk { background: #f7e5e1; color: var(--red); }
    .trade-rule-level {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 11px;
      padding: 7px 9px;
      border: 1px solid #e5d7b9;
      border-radius: 9px;
      background: var(--gold-pale);
    }
    .trade-rule-level span { color: var(--muted); font-size: 9px; }
    .trade-rule-level strong { color: var(--gold-ink); font-size: 10px; text-align: right; }
    .price-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .price-chip {
      display: grid;
      gap: 2px;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--panel-soft);
    }
    .price-chip span, .trade-logic > span:first-child, .trade-rules span, .trade-source > span:first-child {
      color: var(--muted);
      font-size: 11px;
    }
    .price-chip strong { font-size: 15px; font-variant-numeric: tabular-nums; }
    .price-breakout { border-color: #e5cf9c; background: #fff7e3; }
    .price-breakout strong { color: var(--gold-ink); }
    .price-pullback { border-color: #ddd3bf; background: #fbf8f0; }
    .price-stop { border-color: #efd4cf; background: #fff7f5; }
    .price-stop strong { color: var(--red); }
    .trade-logic {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }
    .trade-logic > span:last-child {
      display: -webkit-box;
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .trade-source {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }
    .trade-source summary {
      display: flex;
      min-height: 34px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0 0;
      cursor: pointer;
      list-style: none;
      color: var(--muted);
    }
    .trade-source summary::-webkit-details-marker { display: none; }
    .trade-source summary span:last-child { color: var(--accent-ink); font-weight: 650; }
    .trade-source > div { padding: 8px 0 0; line-height: 1.7; }
    .empty-source { display: flex; justify-content: space-between; padding-top: 9px; color: var(--muted); }
    .trade-rules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 2px;
    }
    .trade-rules > div {
      padding: 10px;
      border-radius: 10px;
      background: rgba(250,245,232,0.7);
    }
    .trade-rules p {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.5;
    }
    .trade-source a, .trade-logic a {
      color: var(--accent-ink);
      font-weight: 600;
    }
    .sector-grid {
      display: grid;
