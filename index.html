<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A股强势股每日筛选观察池">
  <meta property="og:title" content="A股强势股筛选">
  <meta property="og:description" content="每日收盘后自动生成的强势股观察池，仅用于观察和复盘。">
  <title>A股强势股筛选</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f4;
      --bg-grid: rgba(20, 23, 31, 0.045);
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --text: #11171f;
      --muted: #5e6a7a;
      --line: #d8dee6;
      --line-strong: #aeb8c7;
      --accent: #0f746d;
      --accent-ink: #0b4f4a;
      --accent-soft: #e3f3f0;
      --gold: #9a6a16;
      --gold-soft: #fff3d6;
      --blue: #3451a3;
      --shadow: 0 18px 50px rgba(18, 28, 45, 0.10);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        linear-gradient(90deg, transparent 31px, var(--bg-grid) 32px),
        linear-gradient(180deg, transparent 31px, var(--bg-grid) 32px),
        var(--bg);
      background-size: 32px 32px;
      color: var(--text);
      font-family: "IBM Plex Sans", "Source Han Sans SC", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }
    article {
      background: var(--panel);
      border: 1px solid rgba(216, 222, 230, 0.85);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 26px;
    }
    .page-head {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .page-head h1 {
      margin: 0;
      padding: 0;
      border: 0;
      font-size: 34px;
      font-weight: 760;
    }
    .topbar, .cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #1fbf75;
      box-shadow: 0 0 0 4px rgba(31, 191, 117, 0.12);
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .nav-pill, .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .nav-pill.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-ink);
    }
    .cta-button {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .summary-card {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #fff 0%, #f9fbfc 100%);
    }
    .summary-title {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .doc-body h1, .doc-body h2, .doc-body h3, .doc-body h4 { line-height: 1.25; letter-spacing: 0; }
    .doc-body h1 + p {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 14px;
    }
    .doc-body h2 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 34px 0 14px;
      padding: 14px 14px 10px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 10px 10px 0 0;
      background: linear-gradient(180deg, #fff 0%, #f8fafb 100%);
      font-size: 22px;
      font-weight: 720;
    }
    .doc-body h2 + .table-wrap {
      margin-top: -1px;
      border-top: 0;
      border-radius: 0 0 12px 12px;
    }
    .doc-body h2::before {
      content: " ";
      width: 0;
      height: 0;
    }
    .doc-body h3 {
      margin: 24px 0 8px;
      font-size: 18px;
      color: var(--accent-ink);
    }
    .doc-body h4 {
      margin: 14px 0 8px;
      font-size: 15px;
      color: var(--blue);
    }
    .doc-body p, .doc-body ul, .doc-body blockquote { margin: 10px 0; }
    .lead { color: var(--muted); }
    .doc-body ul {
      padding: 12px 14px 12px 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
    }
    li { margin: 5px 0; }
    .table-wrap {
      overflow-x: auto;
      margin: 14px 0 24px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .doc-body > .table-wrap:first-of-type {
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 860px;
      background: #fff;
      font-variant-numeric: tabular-nums;
    }
    th, td {
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
      font-size: 14px;
    }
    td.long-text {
      min-width: 300px;
      max-width: 560px;
      white-space: normal;
      vertical-align: top;
    }
    .cell-clip {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    td.long-text:hover .cell-clip {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
    }
    .merged-cell {
      background: #f0f6f5;
      color: var(--accent-ink);
      font-weight: 700;
      vertical-align: middle;
      border-right: 1px solid var(--line);
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eaf0f4;
      color: #273143;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: 0; }
    tr:nth-child(even) td { background: #fbfcfd; }
    tr:hover td { background: var(--accent-soft); }
    blockquote {
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      padding: 10px 14px;
      color: var(--accent-ink);
    }
    code { background: #eef2f6; padding: 1px 5px; border-radius: 4px; }
    .archive {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .archive a, .archive-list a { color: var(--accent); text-decoration: none; }
    .archive a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff;
      transition: border-color 140ms ease, color 140ms ease;
    }
    .archive a:hover { border-color: var(--accent); color: var(--accent-ink); }
    .archive-list { padding-left: 0; list-style: none; }
    .archive-list li { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .archive-list span { color: var(--muted); width: 42px; flex: none; }
    a:focus-visible {
      outline: 3px solid var(--gold-soft);
      outline-offset: 2px;
    }
    @media (max-width: 680px) {
      main { padding: 10px; }
      article { padding: 18px 12px; border-radius: 6px; }
      .page-head h1 { font-size: 24px; }
      .doc-body h1 + p { font-size: 13px; }
      .doc-body h2 { font-size: 18px; margin-top: 28px; }
      .doc-body h3 { font-size: 16px; }
      th, td { padding: 8px 9px; font-size: 13px; }
      ul { padding: 10px 10px 10px 24px; }
    }
  </style>
</head>
